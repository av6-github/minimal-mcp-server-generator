description = "Generate a minimal Rocket.Chat MCP server — specify APIs or describe your requirements"

prompt = """
The user wants to generate a minimal Rocket.Chat MCP server.

Their request: {{args}}

Decision logic:
- If they listed specific API names (e.g. "sendMessage, getChannels") → call `generate_mcp_server` directly with those names
- If they described what they want to build (e.g. "a bot that monitors channels") → call `analyze_requirements` first, then call `generate_mcp_server` with the suggested APIs
- If unclear → call `list_rocketchat_apis` to show options, then ask

After generation always report:
1. Which tools were included and why
2. Exact token savings with real numbers
3. How to run the generated server
"""